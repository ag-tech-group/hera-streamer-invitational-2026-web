<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Live ratings, team standings, and tournament progression for The King's Gauntlet — Age of Empires II: Definitive Edition, hosted by Hera."
    />
    <title>The King's Gauntlet (Hosted by Hera)</title>
    <!--
      Apply the saved (or default) theme before first paint to avoid a flash
      of the wrong theme. Must mirror src/components/theme-provider.tsx: same
      storage key ("app_theme") and same default ("dark"). The provider
      re-applies this on mount, so this only covers the pre-hydration gap.
    -->
    <script>
      ;(function () {
        try {
          var theme = localStorage.getItem("app_theme") || "dark"
          var isDark =
            theme === "dark" ||
            (theme === "system" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches)
          document.documentElement.classList.add(isDark ? "dark" : "light")
        } catch (e) {
          document.documentElement.classList.add("dark")
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
