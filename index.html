<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <!--
      Search-result favicon (#296). Google renders the icon beside a result
      from a `rel="icon"` of at least 48px square (it recommends a multiple of
      48px); the 16/32 icons above are under that floor, so Search fell back to
      its generic globe. Point it at the existing 256×256 brand mark so Search
      has a large square to downscale — `/logo.png` already ships in `public/`
      and is base-path-redirected in netlify.toml, so no new asset or rule is
      needed. PNG, not SVG: the mark is a detailed raster emblem, not vector
      art. Browser tabs still choose the 16/32 icons by `sizes`; this larger
      one serves Search and high-DPI surfaces.
    -->
    <link rel="icon" type="image/png" sizes="256x256" href="/logo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--
      SEO / social metadata (#179). This block is the source of truth for
      crawlers and link-preview scrapers: the app is a client-rendered SPA,
      so anything set later from JS (e.g. the per-route document.title in
      `useDocumentTitle`) is invisible to non-JS scrapers like Discord,
      Slack, iMessage, and X. Whatever a share preview shows comes from here.

      `og:*`/`twitter:*` values mirror the static <title>/<description> on
      purpose — keep them in sync if either changes.
    -->
    <title>The King's Gauntlet (Hosted by Hera) — Age of Empires II</title>
    <meta
      name="description"
      content="Live ratings, team standings, and tournament progression for The King's Gauntlet — Age of Empires II: Definitive Edition, hosted by Hera."
    />
    <!--
      Canonical points at the path-router public entry (aoe2.criticalbit.gg
      under the /kings-gauntlet/ base path), not the bare Netlify subdomain
      that serves the same dist/. Both hosts resolve to identical content;
      the canonical tells search engines which one to index and consolidates
      ranking signals onto it (#179).
    -->
    <link rel="canonical" href="https://aoe2.criticalbit.gg/kings-gauntlet/" />
    <!-- Matches the dark-theme --background (oklch(0.17 0.012 240)); the app
         defaults to dark, so this is what most visitors see. -->
    <meta name="theme-color" content="#0b1014" />

    <!-- Open Graph (Facebook, Discord, LinkedIn, most chat apps) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="The King's Gauntlet" />
    <meta
      property="og:title"
      content="The King's Gauntlet (Hosted by Hera) — Age of Empires II"
    />
    <meta
      property="og:description"
      content="Live ratings, team standings, and tournament progression for The King's Gauntlet — Age of Empires II: Definitive Edition, hosted by Hera."
    />
    <meta
      property="og:url"
      content="https://aoe2.criticalbit.gg/kings-gauntlet/"
    />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="es_ES" />
    <!--
      Social share card (1200×630, #180). Hosted under the /kings-gauntlet/
      base path — the same path-router entry as the canonical — so scrapers
      fetch it from the host that serves the matching dist/. og:image lives
      here in the Open Graph block; twitter:image mirrors it below.
    -->
    <meta
      property="og:image"
      content="https://aoe2.criticalbit.gg/kings-gauntlet/og-image.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="The King's Gauntlet — Age of Empires II tournament hosted by Hera"
    />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="The King's Gauntlet (Hosted by Hera) — Age of Empires II"
    />
    <meta
      name="twitter:description"
      content="Live ratings, team standings, and tournament progression for The King's Gauntlet — Age of Empires II: Definitive Edition, hosted by Hera."
    />
    <meta
      name="twitter:image"
      content="https://aoe2.criticalbit.gg/kings-gauntlet/og-image.png"
    />

    <!--
      Structured data (#179). A WebSite entity gives search engines the
      canonical site name + URL to render in results rather than an inferred
      one. Kept date-free on purpose: the SportsEvent schema's rich-result
      treatment requires a startDate, and the tournament dates are dynamic
      (served by the API, not known at build time). A runtime SportsEvent
      block fed by the live dates is a sensible follow-up.
    -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "The King's Gauntlet",
        "alternateName": "The King's Gauntlet — Age of Empires II Invitational",
        "url": "https://aoe2.criticalbit.gg/kings-gauntlet/",
        "description": "Live ratings, team standings, and tournament progression for The King's Gauntlet — Age of Empires II: Definitive Edition, hosted by Hera.",
        "inLanguage": ["en", "es"]
      }
    </script>
    <!--
      Apply the saved (or default) theme before first paint to avoid a flash
      of the wrong theme. Must mirror src/components/theme-provider.tsx: same
      storage key ("app_theme") and same default ("dark"). The provider
      re-applies this on mount, so this only covers the pre-hydration gap.
    -->
    <script>
      ;(function () {
        try {
          var theme = localStorage.getItem("app_theme") || "dark"
          var isDark =
            theme === "dark" ||
            (theme === "system" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches)
          document.documentElement.classList.add(isDark ? "dark" : "light")
        } catch (e) {
          document.documentElement.classList.add("dark")
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
