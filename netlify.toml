# Point posthog-js at the first-party `/relay/*` reverse proxy only on
# production builds, so privacy / ad blockers don't drop events by blocking
# `*.i.posthog.com`. The `/relay/*` path is proxied to PostHog by the
# criticalbit-router Cloudflare Worker that fronts this domain — not by a
# Netlify rewrite (the Netlify `/relay/*` rewrites were removed once the
# Worker took over; see criticalbit-router#10). Scoped to the production
# context (main) deliberately: deploy previews and branch deploys leave this
# unset and fall back to direct ingestion (DEFAULT_HOST in src/lib/posthog.ts),
# which keeps preview analytics out of the production proxy path. The proxy
# still needs VITE_POSTHOG_KEY set (Netlify UI) to emit anything.
[context.production.environment]
  VITE_POSTHOG_HOST = "https://aoe2.criticalbit.gg/relay"

[[headers]]
  for = "/*"
  [headers.values]
    # Content-Security-Policy. Locked down by default — `default-src 'self'`,
    # `object-src`/`frame-src 'none'`, `base-uri`/`form-action 'self'`, and a
    # `connect-src` scoped to the criticalbit API (REST + the SSE stream),
    # Sentry, and PostHog. Three relaxations are deliberate and reviewed in the
    # #64 pre-launch security audit:
    #   - script-src 'unsafe-inline': required by the pre-paint theme IIFE in
    #     index.html (sets the theme class before first paint to avoid a flash
    #     of the wrong theme) and PostHog's runtime. The SPA has no
    #     user-controlled HTML-injection surface, so the residual XSS exposure
    #     is low. Dropping it means hashing the inline script via a build step
    #     and re-verifying PostHog — a scoped follow-up, not a launch blocker.
    #   - style-src 'unsafe-inline': React inline styles, Tailwind, and Radix
    #     all emit inline styles; unavoidable without a style-nonce pipeline.
    #   - img-src https:: user avatars resolve to arbitrary federated-identity
    #     CDNs via the auth API and render only on the authenticated admin
    #     surface. Images can't execute, so the wildcard is low-risk.
    # PostHog is normally reached first-party via the `/relay/*` reverse proxy
    # (served by the criticalbit-router Worker), which `connect-src 'self'`
    # already covers. The explicit `us.i.posthog.com` / `us-assets.i.posthog.com`
    # entries stay as the direct-ingestion fallback for when `VITE_POSTHOG_HOST`
    # is unset (e.g. deploy previews) — don't remove them.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://us-assets.i.posthog.com; style-src 'self' 'unsafe-inline'; connect-src 'self' https://*.criticalbit.gg https://*.ingest.us.sentry.io https://us.i.posthog.com https://us-assets.i.posthog.com; worker-src 'self' blob:; img-src 'self' data: https:; object-src 'none'; frame-src 'none'; form-action 'self'; upgrade-insecure-requests; base-uri 'self'"
    # Strict-Transport-Security: explicit 1-year `max-age` plus
    # `includeSubDomains` (so the same HSTS guarantee covers any
    # sibling-subdomain that ever lands under criticalbit.gg) and
    # `preload` (the prerequisite for submitting to the browser HSTS
    # preload list at hstspreload.org). All three directives are
    # required for the strictest security-headers grade.
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Parallel of the rule above for the path-prefixed asset URLs the SPA emits
# under the production deploy's base path (#167). Netlify matches header rules
# on the request URL, not the rewritten path, so without this the hashed
# JS/CSS at /kings-gauntlet/assets/* would miss the immutable cache header.
[[headers]]
  for = "/kings-gauntlet/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# The version manifest must always revalidate so a parked tab's poll sees a new
# deploy promptly (src/lib/version-check.ts). Like index.html, never cache it
# hard. Netlify matches header rules on the request URL (not the rewritten
# path), so the prefixed URL the browser actually requests needs its own rule
# alongside the root one (mirrors the /assets/* pair above).
[[headers]]
  for = "/version.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/kings-gauntlet/version.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Cutover prefix-stripping (#167). Vite's `base = "/kings-gauntlet/"` rewrites
# URLs in the built HTML to include the prefix, but doesn't physically move
# files under a `/kings-gauntlet/` subdirectory in `dist/`. The domain is
# fronted by Cloudflare (the criticalbit-router) which only serves the apex
# `/` → `/kings-gauntlet/` redirect and passes every deeper path through to
# the Netlify origin un-rewritten — it does NOT strip the prefix. So these
# rules run at Netlify and map the prefixed URLs the browser requests back to
# the actual file layout on disk.
#
# Order matters: the specific asset rule has to land before the broader
# `/kings-gauntlet/*` SPA fallback so JS/CSS get the file rather than the
# app shell. The unprefixed catch-all stays as the final fallback for any
# request that doesn't carry the prefix.
[[redirects]]
  from = "/kings-gauntlet/assets/*"
  to = "/assets/:splat"
  status = 200

# `public/fonts/*` is copied to `dist/fonts/*` by Vite and referenced from
# `index.css` (e.g. the Bebas Neue `@font-face`). The URL gets the base
# prefix; the file doesn't. Without this rule a font request falls through
# to the SPA fallback and the browser tries to parse `<!DOCTYPE html…` as a
# font header — observed as "OTS parsing error: invalid sfntVersion".
[[redirects]]
  from = "/kings-gauntlet/fonts/*"
  to = "/fonts/:splat"
  status = 200

# `public/textures/*` is the home for the dark/light noise SVGs the page
# overlay uses. Same prefix-vs-physical asymmetry as fonts above.
[[redirects]]
  from = "/kings-gauntlet/textures/*"
  to = "/textures/:splat"
  status = 200

# `public/civ-emblems/*` is the colored civ shield set for the `/stats` civ
# board (#302). Same prefix-vs-physical asymmetry as fonts/textures above —
# without this the `.webp` falls through to the SPA fallback and the `<img>`
# gets the app shell (HTML) instead of the image, so every emblem renders
# blank on the prefixed production deploy.
[[redirects]]
  from = "/kings-gauntlet/civ-emblems/*"
  to = "/civ-emblems/:splat"
  status = 200

# `public/data/*` holds the frozen read-API snapshots that archive mode serves
# in place of the live backend (#375). Same prefix-vs-physical asymmetry as the
# asset rules above — without this the `.json` falls through to the SPA fallback
# and the archive fetch gets the app shell (HTML) instead of JSON, so every view
# fails to parse its data on the prefixed production deploy. Harmless when
# archive mode is off (nothing requests these paths). Must land before the
# `/kings-gauntlet/*` fallback.
[[redirects]]
  from = "/kings-gauntlet/data/*"
  to = "/data/:splat"
  status = 200

# Root-level files in `public/` (favicons, app icon, logo, plain-text
# files) are referenced from the built HTML under the base prefix but live
# at the deploy root. Enumerated rather than glob-matched because a broader
# `/kings-gauntlet/*.png`-style pattern would shadow the SPA fallback below
# for any route name that happens to end in an extension.
[[redirects]]
  from = "/kings-gauntlet/favicon.ico"
  to = "/favicon.ico"
  status = 200

[[redirects]]
  from = "/kings-gauntlet/favicon-16x16.png"
  to = "/favicon-16x16.png"
  status = 200

[[redirects]]
  from = "/kings-gauntlet/favicon-32x32.png"
  to = "/favicon-32x32.png"
  status = 200

[[redirects]]
  from = "/kings-gauntlet/apple-touch-icon.png"
  to = "/apple-touch-icon.png"
  status = 200

[[redirects]]
  from = "/kings-gauntlet/logo.png"
  to = "/logo.png"
  status = 200

[[redirects]]
  from = "/kings-gauntlet/robots.txt"
  to = "/robots.txt"
  status = 200

[[redirects]]
  from = "/kings-gauntlet/llms.txt"
  to = "/llms.txt"
  status = 200

[[redirects]]
  from = "/kings-gauntlet/sitemap.xml"
  to = "/sitemap.xml"
  status = 200

# `version.json` is emitted at the deploy root by the `emit-version-json` Vite
# plugin and polled by the client version check (src/lib/version-check.ts) to
# refresh long-lived tabs onto new deploys. Same prefix-vs-physical asymmetry
# as the root files above — without this the request falls through to the SPA
# fallback and the poller gets the app shell (HTML) instead of JSON, so it can
# never detect an update. Must land before the `/kings-gauntlet/*` fallback.
[[redirects]]
  from = "/kings-gauntlet/version.json"
  to = "/version.json"
  status = 200

[[redirects]]
  from = "/kings-gauntlet/*"
  to = "/index.html"
  status = 200

# Bare apex → tournament path. Visitors who land on `aoe2.criticalbit.gg/`
# directly (e.g. from a bookmark of the host domain) get bounced into the
# tournament rather than seeing the SPA mounted at root, which wouldn't
# match the build's `base = "/kings-gauntlet/"` and would render NotFound.
# 302 (temporary) so a future hub page at the bare apex can take over
# without aggressive browser/CDN caching of this redirect.
#
# Composes harmlessly with `criticalbit-router#5` if that ever fires —
# both target the same path, so whichever is reached first wins and the
# other becomes a no-op.
[[redirects]]
  from = "/"
  to = "/kings-gauntlet/"
  status = 302

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
